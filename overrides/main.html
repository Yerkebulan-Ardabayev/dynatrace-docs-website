{% extends "base.html" %}

{% block announce %}{% endblock %}

{% block extrahead %}
  <style>
    /* DocFlow DT Logo Badge — injected via template override */
    .md-header__button.md-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .md-header__button.md-logo img,
    .md-header__button.md-logo svg {
      display: none !important;
    }
    .md-header__button.md-logo::before {
      content: 'DT';
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #00d4aa 0%, #7c3aed 100%);
      color: white;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    /* Search Ctrl+K badge — inside input field */
    .md-search__form {
      position: relative;
    }
    .md-search__form::after {
      content: 'Ctrl+K';
      display: none;
      align-items: center;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      border: 1px solid var(--docflow-border);
      background: var(--md-default-bg-color);
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--md-default-fg-color--lighter);
      white-space: nowrap;
      pointer-events: none;
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
    }
    @media (min-width: 60em) {
      .md-search__form::after {
        display: flex;
      }
    }
  </style>
{% endblock %}

{% block header %}
  {{ super() }}
{% endblock %}

{% block content %}
  {{ super() }}
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    (function() {
      // --- Keyboard shortcut Ctrl+K / Cmd+K for search ---
      document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          var searchInput = document.querySelector('.md-search__input');
          if (searchInput) {
            searchInput.focus();
            var searchToggle = document.querySelector('[data-md-toggle="search"]');
            if (searchToggle && !searchToggle.checked) {
              searchToggle.checked = true;
              searchToggle.dispatchEvent(new Event('change'));
            }
          }
        }
        // --- "/" focuses search like GitHub / Algolia docs ---
        if (e.key === '/' && !/^(input|textarea|select)$/i.test(e.target.tagName)) {
          e.preventDefault();
          var inp = document.querySelector('.md-search__input');
          if (inp) {
            inp.focus();
            var t = document.querySelector('[data-md-toggle="search"]');
            if (t && !t.checked) { t.checked = true; t.dispatchEvent(new Event('change')); }
          }
        }
      });
    })();
  </script>
{% endblock %}
