{% extends "base.html" %}

{% block announce %}{% endblock %}

{% block extrahead %}
  <style>
    /* DocFlow DT Logo Badge — injected via template override */
    .md-header__button.md-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .md-header__button.md-logo img,
    .md-header__button.md-logo svg {
      display: none !important;
    }
    .md-header__button.md-logo::before {
      content: 'DT';
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #00d4aa 0%, #7c3aed 100%);
      color: white;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    /* Search Ctrl+K badge — inside input field */
    .md-search__form {
      position: relative;
    }
    .md-search__form::after {
      content: 'Ctrl+K';
      display: none;
      align-items: center;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      border: 1px solid var(--docflow-border);
      background: var(--md-default-bg-color);
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--md-default-fg-color--lighter);
      white-space: nowrap;
      pointer-events: none;
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
    }
    @media (min-width: 60em) {
      .md-search__form::after {
        display: flex;
      }
    }

    /* Managed label — non-interactive indicator */
    .docflow-managed-label {
      display: none;
      align-items: center;
      gap: 0.375rem;
      margin-left: 0.5rem;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--docflow-border);
      background: var(--md-default-bg-color--lighter);
      color: var(--md-default-fg-color--lighter);
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      pointer-events: none;
      user-select: none;
    }
    .docflow-managed-label::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--md-accent-fg-color);
      flex-shrink: 0;
    }
    @media (min-width: 60em) {
      .docflow-managed-label {
        display: flex;
      }
    }

    /* Reading progress bar */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #14b8a6, #7c3aed);
      z-index: 1001;
      transition: width 0.05s linear;
      pointer-events: none;
    }
  </style>
{% endblock %}

{% block header %}
  {{ super() }}
{% endblock %}

{% block content %}
  {{ super() }}
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    (function() {
      // --- Reading progress bar (one-time setup) ---
      var progressBar = document.createElement('div');
      progressBar.className = 'reading-progress';
      document.body.appendChild(progressBar);

      window.addEventListener('scroll', function() {
        var scrollTop = window.scrollY || document.documentElement.scrollTop;
        var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        if (docHeight > 0) {
          var progress = (scrollTop / docHeight) * 100;
          progressBar.style.width = Math.min(progress, 100) + '%';
        }
      });

      // --- Managed label in header (one-time setup) ---
      var headerInner = document.querySelector('.md-header__inner');
      if (headerInner && !headerInner.querySelector('.docflow-managed-label')) {
        var label = document.createElement('span');
        label.className = 'docflow-managed-label';
        label.textContent = 'Managed';
        label.setAttribute('title', 'Документация включает разделы Dynatrace Managed');

        var searchContainer = headerInner.querySelector('.md-header__source');
        if (searchContainer) {
          headerInner.insertBefore(label, searchContainer);
        } else {
          headerInner.appendChild(label);
        }
      }

      // --- Keyboard shortcut Ctrl+K for search ---
      document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          var searchInput = document.querySelector('.md-search__input');
          if (searchInput) {
            searchInput.focus();
            var searchToggle = document.querySelector('[data-md-toggle="search"]');
            if (searchToggle && !searchToggle.checked) {
              searchToggle.checked = true;
              searchToggle.dispatchEvent(new Event('change'));
            }
          }
        }
      });

      // TOC title renaming handled via CSS (see extra style block above)
    })();
  </script>
{% endblock %}
