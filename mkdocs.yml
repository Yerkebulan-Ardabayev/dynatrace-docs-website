site_name: Dynatrace Managed - Документация
site_description: Документация Dynatrace Managed с AI-помощником
site_author: Yerkebulan Ardabayev
site_url: https://yerkebulan-ardabayev.github.io/dynatrace-docs-website/

repo_name: dynatrace-docs-website
repo_url: https://github.com/Yerkebulan-Ardabayev/dynatrace-docs-website
edit_uri: ""

# URL configuration
use_directory_urls: true

theme:
  name: material
  language: ru
  
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Светлая тема
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
  
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  
  icon:
    logo: material/server
    repo: fontawesome/brands/github
  
  font:
    text: Roboto
    code: JetBrains Mono

plugins:
  - search:
      lang:
        - ru
        - en
      exclude:
        - notebooklm/**
        - DYNATRACE_MANAGED_FULL/**

