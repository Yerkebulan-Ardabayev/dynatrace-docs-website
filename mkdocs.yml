markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/groq-chat.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Yerkebulan-Ardabayev

copyright: "\xA9 2026 Dynatrace Docs | Yerkebulan Ardabayev"
