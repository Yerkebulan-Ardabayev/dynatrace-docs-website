site_name: Dynatrace — Документация
site_description: Документация Dynatrace Managed с AI-помощником
site_author: Yerkebulan Ardabayev
site_url: https://yerkebulan-ardabayev.github.io/dynatrace-docs-website/

repo_name: dynatrace-docs-website
repo_url: https://github.com/Yerkebulan-Ardabayev/dynatrace-docs-website
edit_uri: ""

use_directory_urls: true

theme:
  name: material
  language: ru
  custom_dir: docs/overrides

  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Переключить на светлую тему
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Переключить на тёмную тему

  features:
    # --- Single-source navigation: left sidebar only, collapsible ---
    # navigation.indexes ВЕРНУТЬ: без него Material для паттерна
    #   secure/threat-observability.md + secure/threat-observability/…
    # показывает «Наблюдаемость угроз» ДВАЖДЫ — как label секции и как первую
    # ссылку. С navigation.indexes = страница становится кликабельным заголовком
    # секции, дубль исчезает.
    - navigation.indexes
    - navigation.prune
    - navigation.path
    - navigation.tracking
    - navigation.top
    # navigation.instant УБРАН — вызывал «прыжки» при кликах на ссылки
    # (сохранял scroll position с предыдущей страницы → визуальный jump).
    # toc.integrate УБРАН — создавал визуальные дубли:
    # пункт «Главная» + TOC текущей страницы под ним выглядели как два «Главная».
    # --- Search ---
    - search.suggest
    - search.highlight
    - search.share
    # --- Code & content ---
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    # --- TOC ---
    - toc.follow

  icon:
    logo: material/lightning-bolt
    repo: fontawesome/brands/github

  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search:
      lang:
        - ru
        - en

# Исключить из сборки. Сайт = только Dynatrace Managed (docs/managed-ru).
exclude_docs: |
  notebooklm/
  ai/notebooklm.md
  # EN-сырьё пайплайна: раздувало search_index.json (>100 МБ, deploy падал с 25.06)
  # и дублировало темы в поиске. На диске остаётся (читается детектом), из сайта убрано.
  en/
  managed/
  # Managed-only (решение юзера): docs/ru и docs/common это SaaS/Platform-навигатор
  # (Grail/DQL/Davis; source www.dynatrace.com/docs и docs.dynatrace.com/docs), к
  # Dynatrace Managed не применим -> убран из сборки и поиска. Ни одна Managed-страница
  # на него не ссылается (проверено). Оставляем только кастомные (не-SaaS) страницы:
  # свой getting-started и обучение Jusan.
  ru/
  common/
  !ru/getting-started.md
  !ru/training/

# Пост-обработка сборки: search_index.json -> UTF-8 (иначе кириллица как \uXXXX
# раздувает индекс до ~106 МБ > лимита GitHub 100 МБ и валит deploy). См. аудит B2/U1.
hooks:
  - hooks/utf8_search_index.py

# Валидация ссылок (mkdocs 1.6+). Незапиненный mkdocs обновился и включил
# строгие проверки ссылок, на которых `--strict` стал падать (мина U3 аудита):
#   - anchors: 27 висячих якорей в переведённом корпусе (сноски #fn-*-def в
#     semantic-dictionary/model/trace.md, артефакт скрейпа, + 2 секционных якоря).
#     Отключаем проверку якорей целиком: шумно на скрейп/перевод-контенте.
#   - not_found (info, не warn): 22 доконтентные ссылки в docs/ru на страницы,
#     которые ещё НЕ переведены (напр. new-rum-experience/experience-vitals.md,
#     secure/investigations/enhance-results.md). Ссылки НАМЕРЕННЫЕ (из ориг. доки
#     Dynatrace) и уже были 404 на живом сайте; удалять их неверно, чинятся
#     переводом целевых страниц. Уровень info: видны в каждом build-логе, но не
#     блокируют публикацию всего сайта. Целостность nav/конфига остаётся фатальной
#     (проверяется отдельно, не через links.not_found). Вернуть на warn, когда
#     пробелы docs/ru закрыты.
validation:
  links:
    anchors: ignore
    not_found: info

# =============================================================================
# НАВИГАЦИЯ: только Dynatrace Managed (сайт Managed-only, решение юзера).
# Все разделы ведут на docs/managed-ru (корпус Managed, source docs.dynatrace.com/managed).
# SaaS-дерево docs/ru убрано из сборки (exclude_docs), кроме кастомных страниц
# (свой getting-started + обучение Jusan). Единый язык заголовков RU.
# =============================================================================
nav:
  - Главная: index.md

  # --- НАЧАЛО РАБОТЫ ---
  - Начало работы:
    - Быстрый старт: ru/getting-started.md
    - Что такое Dynatrace: managed-ru/discover-dynatrace/what-is-dynatrace.md
    - Начало работы с Managed: managed-ru/discover-dynatrace/get-started.md
    - Обзор Dynatrace Managed: managed-ru/managed.md

  # --- КЛАСТЕР MANAGED (администрирование) ---
  - Кластер Managed:
    - Обзор кластера: managed-ru/managed-cluster.md
    - Установка: managed-ru/installation.md
    - Настройка: managed-ru/configuration.md
    - Обслуживание: managed-ru/operations.md
    - Обновление: managed-ru/update.md
    - Апгрейд версии: managed-ru/upgrade.md
    - Безопасность: managed-ru/security.md
    - Резервное копирование: managed-ru/backup.md
    - Лицензия: managed-ru/license.md

  # --- ИСТОЧНИКИ ДАННЫХ ---
  - Источники данных:
    - Обзор источников: managed-ru/ingest-from.md
    - OneAgent: managed-ru/ingest-from/dynatrace-oneagent.md
    - ActiveGate: managed-ru/ingest-from/dynatrace-activegate.md
    - Kubernetes: managed-ru/ingest-from/setup-on-k8s.md
    - Amazon Web Services: managed-ru/ingest-from/amazon-web-services.md
    - Microsoft Azure: managed-ru/ingest-from/microsoft-azure-services.md
    - Google Cloud: managed-ru/ingest-from/google-cloud-platform.md
    - Расширения: managed-ru/ingest-from/extensions.md
    - OpenTelemetry: managed-ru/ingest-from/opentelemetry.md

  # --- НАБЛЮДАЕМОСТЬ ---
  - Наблюдаемость:
    - Инфраструктура: managed-ru/observe/infrastructure-observability.md
    - Приложения: managed-ru/observe/application-observability.md
    - Распределённые трейсы: managed-ru/observe/application-observability/distributed-traces.md
    - Цифровой опыт: managed-ru/observe/digital-experience.md

  # --- DAVIS AI ---
  - Davis AI: managed-ru/dynatrace-intelligence.md

  # --- АНАЛИЗ ---
  - Анализ:
    - Smartscape Classic: managed-ru/analyze-explore-automate/smartscape-classic.md
    - Классические дашборды: managed-ru/analyze-explore-automate/dashboards-classic.md
    - Обозреватель данных: managed-ru/analyze-explore-automate/explorer.md
    - Классические метрики: managed-ru/analyze-explore-automate/metrics-classic.md
    - Мониторинг логов: managed-ru/analyze-explore-automate/log-monitoring.md
    - Уведомления и оповещения: managed-ru/analyze-explore-automate/notifications-and-alerting.md

  # --- DELIVER ---
  - Deliver:
    - Обзор Deliver: managed-ru/deliver.md
    - Configuration as Code: managed-ru/deliver/configuration-as-code.md
    - Ownership: managed-ru/deliver/ownership.md

  # --- БЕЗОПАСНОСТЬ ПРИЛОЖЕНИЙ ---
  - Безопасность приложений:
    - Application Security: managed-ru/secure/application-security.md
    - Частые вопросы: managed-ru/secure/faq.md

  # --- УПРАВЛЕНИЕ ---
  - Управление:
    - Управление доступом (IAM): managed-ru/manage/identity-access-management.md
    - Управление аккаунтом: managed-ru/manage/account-management.md
    - Приватность и безопасность данных: managed-ru/manage/data-privacy-and-security.md
    - Зоны сети: managed-ru/manage/network-zones.md
    - Настройки (Settings 2.0): managed-ru/manage/settings/settings-20.md
    - Теги и метаданные: managed-ru/manage/tags-and-metadata.md
    - Системные уведомления: managed-ru/manage/system-notifications.md

  # --- ПЛАТФОРМА ---
  - Платформа:
    - OneAgent: managed-ru/platform/oneagent.md

  # --- API ---
  - API:
    - Обзор API: managed-ru/dynatrace-api.md
    - Environment API: managed-ru/dynatrace-api/environment-api.md
    - Configuration API: managed-ru/dynatrace-api/configuration-api.md
    - Account Management API: managed-ru/dynatrace-api/account-management-api.md
    - Cluster API v2: managed-ru/dynatrace-api/cluster-api/cluster-api-v2.md
    - Аутентификация: managed-ru/dynatrace-api/basics/dynatrace-api-authentication.md

  # --- ЧТО НОВОГО ---
  - Что нового:
    - Dynatrace Managed: managed-ru/whats-new/managed.md
    - OneAgent: managed-ru/whats-new/oneagent.md
    - ActiveGate: managed-ru/whats-new/activegate.md

  # --- ОБУЧЕНИЕ JUSAN ---
  - Обучение:
    - "День 1. Введение в Dynatrace": ru/training/day1-introduction.md

  # --- AI ПОМОЩНИК ---
  - AI Помощник: ai/groq.md


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables

extra_css:
  - assets/stylesheets/extra.v11.css

extra_javascript:
  - assets/javascripts/groq-chat.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Yerkebulan-Ardabayev

copyright: "\xA9 2026 Dynatrace Docs | Yerkebulan Ardabayev"
