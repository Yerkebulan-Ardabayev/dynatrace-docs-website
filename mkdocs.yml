site_name: Dynatrace — Документация
site_description: Документация Dynatrace с AI-помощником (Managed + SaaS)
site_author: Yerkebulan Ardabayev
site_url: https://yerkebulan-ardabayev.github.io/dynatrace-docs-website/

repo_name: dynatrace-docs-website
repo_url: https://github.com/Yerkebulan-Ardabayev/dynatrace-docs-website
edit_uri: ""

use_directory_urls: true

theme:
  name: material
  language: ru

  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Светлая тема
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Тёмная тема

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.path          # breadcrumbs
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

  icon:
    logo: material/server
    repo: fontawesome/brands/github

  font:
    text: Roboto
    code: JetBrains Mono

plugins:
  - search:
      lang:
        - ru
        - en
      exclude:
        - notebooklm/**
        - DYNATRACE_MANAGED_FULL/**

# =============================================================================
# НАВИГАЦИЯ — Оптимизированная информационная архитектура
# Макс. глубина: 4 уровня | Единый язык заголовков (RU)
# =============================================================================
nav:
  - Главная: index.md

  # --- НАЧАЛО РАБОТЫ ---
  - Начало работы:
    - Документация Dynatrace: ru/index.md
    - Начало работы: ru/getting-started.md
    - Что такое Dynatrace: en/discover-dynatrace/what-is-dynatrace.md
    - Приложения Dynatrace: en/discover-dynatrace/dynatrace-apps.md
    - Семантический словарь: ru/semantic-dictionary.md

  # --- DYNATRACE MANAGED ---
  - Managed:
    - Обзор: managed/index.md
    - Установка: managed/installation.md
    - Настройка: managed/configuration.md
    - Обслуживание: managed/operations.md
    - Обновления: managed/update.md
    - Безопасность: managed/security.md
    - Резервное копирование: managed/backup.md
    - Кластер: managed/managed-cluster.md
    - Лицензия: managed/license.md

  # --- ПЛАТФОРМА ---
  - Платформа:
    - Grail:
      - Что такое Grail: en/platform/grail/dynatrace-grail.md
      - Язык запросов DQL: en/platform/grail/dynatrace-query-language.md
    - OneAgent: en/platform/oneagent.md
    - AppEngine: en/platform/appengine.md
    - OpenPipeline: en/platform/openpipeline.md

  # --- НАБЛЮДАЕМОСТЬ ---
  - Наблюдаемость:
    - Инфраструктура:
      - Обзор: en/observe/infrastructure-observability.md
      - Хосты и операции: en/observe/infrastructure-observability/infrastructure-and-operations.md
