name: Sync Dynatrace Documentation

on:
  schedule:
    # Daily at 02:00 Kazakhstan time (UTC+5) = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max pages to scrape (0 = unlimited)'
        type: number
        default: 1000
      skip_scrape:
        description: 'Skip scraping, only detect changes'
        type: boolean
        default: false

concurrency:
  group: sync-docs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ---------- STAGE 1: Scrape English docs ----------
      - name: Scrape documentation
        id: scrape
        if: ${{ !inputs.skip_scrape }}
        run: |
          set -e
          echo "=== Stage 1: Scraping Dynatrace documentation ==="
          cd scripts
          python scrape_docs.py --max-pages ${{ inputs.max_pages || 1000 }} 2>&1 | tail -30
          echo "scrape_done=true" >> $GITHUB_OUTPUT

      - name: Verify scrape results
        if: steps.scrape.outputs.scrape_done == 'true'
        run: |
          set -e
          COUNT=$(find docs/en -name "*.md" 2>/dev/null | wc -l)
          echo "Scraped files: $COUNT"
          if [ "$COUNT" -lt 5 ]; then
            echo "::error::Scrape returned only $COUNT files — possible scraper failure"
            exit 1
          fi
          echo "scrape_verified=true" >> $GITHUB_OUTPUT

      - name: Organize files
        if: steps.scrape.outputs.scrape_done == 'true'
        run: |
          set -e
          if [ -f scripts/organize_docs.py ]; then
            python scripts/organize_docs.py
          fi

      # ---------- STAGE 2: Detect changes ----------
      - name: Detect new and updated articles
        id: detect
        run: |
          set -e
          echo "=== Stage 2: Detecting changes ==="
          python scripts/detect_changes.py \
            --source-dir docs/en \
            --target-dir docs/ru \
            --repo ${{ github.repository }} \
            --report changes_report.json \
            --markdown changes_report.md

          # Read counts from report
          if [ -f changes_report.json ]; then
            NEW_COUNT=$(python -c "import json; r=json.load(open('changes_report.json')); print(r['new_count'])")
            UPDATED_COUNT=$(python -c "import json; r=json.load(open('changes_report.json')); print(r['updated_count'])")
            TOTAL=$(python -c "import json; r=json.load(open('changes_report.json')); print(r['total_changes'])")
            echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
            echo "updated_count=$UPDATED_COUNT" >> $GITHUB_OUTPUT
            echo "total_changes=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "total_changes=0" >> $GITHUB_OUTPUT
          fi

      # ---------- STAGE 3: Commit English docs ----------
      - name: Commit English docs update
        id: commit
        if: steps.detect.outputs.total_changes != '0'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/en/ scripts/dynatrace-docs/
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            CHANGED=$(git diff --staged --stat | tail -1)
            git commit -m "docs(en): sync from docs.dynatrace.com $(date +%Y-%m-%d)

          $CHANGED"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      # ---------- STAGE 4: Create GitHub Issue with notification ----------
      - name: Ensure labels exist
        if: steps.detect.outputs.total_changes != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "translation" --description "Requires translation" --color "0e8a16" 2>/dev/null || true
          gh label create "documentation" --description "Documentation changes" --color "0075ca" 2>/dev/null || true
          gh label create "automated" --description "Created by CI pipeline" --color "d4c5f9" 2>/dev/null || true

      - name: Create translation issue
        if: steps.detect.outputs.total_changes != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW=${{ steps.detect.outputs.new_count }}
          UPDATED=${{ steps.detect.outputs.updated_count }}
          TOTAL=${{ steps.detect.outputs.total_changes }}
          DATE=$(date +%Y-%m-%d)

          # Read the markdown report
          BODY=""
          if [ -f changes_report.md ]; then
            BODY=$(cat changes_report.md)
          else
            BODY="Обнаружено $TOTAL изменений: $NEW новых, $UPDATED обновлённых статей."
          fi

          # Append notification footer
          BODY="${BODY}

          ---
          🔔 **Уведомление:** Обнаружены изменения в английской документации.
          📊 Новых: ${NEW} | Обновлённых: ${UPDATED} | Всего: ${TOTAL}
          🕐 Дата синхронизации: ${DATE}
          🤖 Создано автоматически пайплайном sync-docs."

          # Create issue with labels and assign to repo owner
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          gh issue create \
            --title "📝 Перевод: $TOTAL статей требуют перевода ($DATE)" \
            --body "$BODY" \
            --label "translation,documentation,automated" \
            --assignee "$REPO_OWNER" \
            || gh issue create \
              --title "📝 Перевод: $TOTAL статей требуют перевода ($DATE)" \
              --body "$BODY"

      # ---------- STAGE 4b: Telegram notification ----------
      - name: Send Telegram notification
        if: steps.detect.outputs.total_changes != '0'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          NEW=${{ steps.detect.outputs.new_count || 0 }}
          UPDATED=${{ steps.detect.outputs.updated_count || 0 }}
          TOTAL=${{ steps.detect.outputs.total_changes || 0 }}
          DATE=$(date +%Y-%m-%d)
          REPO_URL="https://github.com/${{ github.repository }}"

          # Build Telegram message
          NL=$'\n'
          MSG="📝 *Dynatrace Docs — Перевод*${NL}${NL}📊 Обнаружено *${TOTAL}* статей для перевода:${NL}  • Новых: *${NEW}*${NL}  • Обновлённых: *${UPDATED}*${NL}${NL}🕐 Дата синхронизации: ${DATE}${NL}🔗 [Открыть Issues](${REPO_URL}/issues?q=label%3Atranslation+is%3Aopen)${NL}🤖 Автоматическое уведомление"

          # Send via Telegram Bot API
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode="Markdown" \
              -d disable_web_page_preview="true" \
              --connect-timeout 10 \
              --max-time 15 \
              || echo "WARNING: Telegram notification failed (non-blocking)"
          else
            echo "WARNING: TG_BOT_TOKEN or TG_CHAT_ID not set, skipping Telegram notification"
          fi

      # ---------- STAGE 5: Build & Deploy ----------
      - name: Validate docs
        run: python scripts/quality/test_docs.py

      - name: Build MkDocs
        if: steps.commit.outputs.committed == 'true'
        run: mkdocs build

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.committed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: sync English docs update'

      # ---------- Summary ----------
      - name: Pipeline summary
        if: always()
        run: |
          echo "# Documentation Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| New articles | ${{ steps.detect.outputs.new_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Updated articles | ${{ steps.detect.outputs.updated_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total changes | ${{ steps.detect.outputs.total_changes || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Committed | ${{ steps.commit.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.detect.outputs.total_changes }}" != "0" ]; then
            echo "⚠️ **Требуется перевод!** Проверьте GitHub Issues для списка статей." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Нет новых изменений. Все статьи актуальны." >> $GITHUB_STEP_SUMMARY
          fi
