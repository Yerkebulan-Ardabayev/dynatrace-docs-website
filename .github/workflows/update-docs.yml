name: Sync Dynatrace Documentation

on:
  schedule:
    # Daily at 02:00 Kazakhstan time (UTC+5) = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        # Должно быть >= размера корпуса Managed (~2693 стр.), иначе полный обход
        # невозможен и апстрим-изменения теряются (B6 аудита). Было 1000 < 2693.
        description: 'Max pages to scrape (>= ~2700 для полного обхода)'
        type: number
        default: 5000
      skip_scrape:
        description: 'Skip scraping, only detect changes'
        type: boolean
        default: false

# Общая с deploy.yml группа gh-pages: sync (со своим Stage-деплоем) и ручной
# deploy.yml не публикуют в gh-pages одновременно (B4). Также не даёт двум sync
# наложиться. cancel-in-progress: false, чтобы не рвать идущую публикацию.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # 60 мин не хватало на полный скрейп ~2700 стр. без If-Modified-Since (B7):
    # ночной sync отменялся на 60-й минуте прямо на Stage 1. 180 = запас на
    # скрейп (~40 мин при delay 0.5с) + detect + translate + PDF + build + deploy.
    timeout-minutes: 180
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install weasyprint markdown

      # Кэш реестра хэшей УДАЛЁН: реестром владеет локальный переводчик на Mac
      # (scripts/run_local_translate.sh), единственный источник правды — файл в
      # репозитории. Восстановление из actions/cache поверх checkout вернуло бы
      # старое состояние и подняло уже переведённые статьи как «требуют перевода».

      # ---------- STAGE 1: Scrape Managed docs (канонический корпус) ----------
      - name: Scrape documentation
        id: scrape
        if: ${{ !inputs.skip_scrape }}
        run: |
          set -e
          echo "=== Stage 1: Scraping Dynatrace MANAGED documentation ==="
          # Пишем напрямую в канонический Managed-корпус docs/managed (без мёртвого
          # organize-шага): scrape_docs.py раскладывает по структуре URL и защищён
          # от path traversal. Запуск из корня репо, чтобы docs/managed резолвился.
          python scripts/scrape_docs.py \
            --output docs/managed \
            --max-pages ${{ inputs.max_pages || 5000 }} 2>&1 | tail -30
          echo "scrape_done=true" >> $GITHUB_OUTPUT

      - name: Verify scrape results
        if: steps.scrape.outputs.scrape_done == 'true'
        run: |
          set -e
          COUNT=$(find docs/managed -name "*.md" 2>/dev/null | wc -l)
          echo "Scraped files (docs/managed): $COUNT"
          if [ "$COUNT" -lt 5 ]; then
            echo "::error::Scrape returned only $COUNT files — possible scraper failure"
            exit 1
          fi
          echo "scrape_verified=true" >> $GITHUB_OUTPUT

      # ---------- GATE A: корпус действительно Managed ----------
      # verify_corpus.py валит прогон, если в docs/managed попал чужой (не-Managed)
      # source. Стоит НА пути ДО перевода: не переводим и не коммитим мусор.
      - name: Gate — verify Managed corpus
        id: verify_corpus
        if: steps.scrape.outputs.scrape_done == 'true'
        run: |
          set -e
          echo "=== Gate A: verify docs/managed is really Managed ==="
          python scripts/verify_corpus.py

      # ---------- STAGE 2: Detect changes (managed -> managed-ru) ----------
      # Только чтобы посчитать очередь для Telegram. Реестр НЕ трогаем: его ведёт
      # локальный переводчик, и запись из CI ломала бы учёт переведённого.
      - name: Detect new and updated articles
        id: detect
        run: |
          set -e
          echo "=== Stage 2: Detecting changes (managed -> managed-ru) ==="
          python scripts/detect_changes.py \
            --source-dir docs/managed \
            --target-dir docs/managed-ru \
            --repo ${{ github.repository }} \
            --report changes_report.json \
            --markdown changes_report.md \
            --no-registry-update

          # Read counts from report
          if [ -f changes_report.json ]; then
            NEW_COUNT=$(python -c "import json; r=json.load(open('changes_report.json')); print(r['new_count'])")
            UPDATED_COUNT=$(python -c "import json; r=json.load(open('changes_report.json')); print(r['updated_count'])")
            TOTAL=$(python -c "import json; r=json.load(open('changes_report.json')); print(r['total_changes'])")
            echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
            echo "updated_count=$UPDATED_COUNT" >> $GITHUB_OUTPUT
            echo "total_changes=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "new_count=0" >> $GITHUB_OUTPUT
            echo "updated_count=0" >> $GITHUB_OUTPUT
            echo "total_changes=0" >> $GITHUB_OUTPUT
          fi

      # ---------- STAGE 3-4 УДАЛЕНЫ ----------
      # Перевод, гейт валидации и генерация PDF ушли на Mac в
      # scripts/run_local_translate.sh: headless claude -p работает по OAuth-токену
      # подписки, которому не место в секретах публичного репозитория, а разбор
      # бэклога не влезает в лимит джобы 180 минут. PDF-шаг вдобавок был мёртвым:
      # он зависел от результата перевода в CI, поэтому не сработал ни разу
      # (в репозитории 0 файлов pdf-docs, на сайте раздел отдаёт 404).

      # ---------- STAGE 5: Commit all changes ----------
      - name: Commit changes
        id: commit
        if: steps.detect.outputs.total_changes != '0'
        run: |
          set -e
          git config user.name "Yerkebulan Ardabayev"
          git config user.email "yerkebulan.ardabayev@gmail.com"

          # CI коммитит ТОЛЬКО английский корпус. Русский перевод и реестр хэшей
          # ведёт локальный переводчик на Mac и пушит сам: если добавлять их здесь,
          # два источника начнут переписывать друг друга.
          git add docs/managed/

          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            CHANGED=$(git diff --staged --stat | tail -1)
            DATE=$(date +%Y-%m-%d)

            MSG="docs: sync Managed from docs.dynatrace.com/managed ${DATE}"

            git commit -m "${MSG}

          ${CHANGED}"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      # ---------- STAGE 6 УДАЛЁН ----------
      # Ночное создание issue со списком статей отключено: пока перевод не шёл,
      # оно каждую ночь плодило письмо и новую issue с тем же растущим списком
      # (#1..#14). Очередь теперь разбирает ночной переводчик на Mac, а сводка
      # приходит в Telegram ниже.

      # ---------- STAGE 7: Telegram success notification (ONLY when real updates) ----------
      - name: Send Telegram notification (updates)
        if: steps.detect.outputs.total_changes != '0' && steps.detect.outputs.total_changes != ''
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          NEW=${{ steps.detect.outputs.new_count || 0 }}
          UPDATED=${{ steps.detect.outputs.updated_count || 0 }}
          TOTAL=${{ steps.detect.outputs.total_changes || 0 }}
          DATE=$(date +%Y-%m-%d)
          REPO_URL="https://github.com/${{ github.repository }}"
          SITE_URL="https://yerkebulan-ardabayev.github.io/dynatrace-docs-website/"
          NL=$'\n'

          MSG="📝 <b>Dynatrace Docs — Обновления</b>${NL}"
          MSG="${MSG}${NL}📊 Обнаружено <b>${TOTAL}</b> изменений:${NL}"
          MSG="${MSG}  • Новых статей: <b>${NEW}</b>${NL}"
          MSG="${MSG}  • Обновлённых: <b>${UPDATED}</b>${NL}"

          MSG="${MSG}${NL}🤖 Перевод разберёт ночной прогон на Mac (claude -p, 03:30).${NL}"

          # Добавить описание изменений из отчёта
          if [ -f changes_report.json ]; then
            DETAILS=$(python3 -c "
          import json
          r = json.load(open('changes_report.json'))
          sections = {}
          for a in r.get('new_articles', []) + r.get('updated_articles', []):
              sec = a.get('section', 'Другое')
              sections.setdefault(sec, []).append(a)
          lines = []
          esc = lambda s: s.replace('&','&amp;').replace('<','&lt;').replace('>','&gt;')
          for sec, arts in sorted(sections.items()):
              titles = [a.get('title', a['path']) for a in arts[:5]]
              lines.append(f'<b>{esc(sec)}</b> ({len(arts)} шт.)')
              for t in titles:
                  lines.append(f'  — {esc(t)}')
              if len(arts) > 5:
                  lines.append(f'  — ...и ещё {len(arts)-5}')
          print(chr(10).join(lines[:30]))
          " 2>/dev/null || echo "")

            # Извлечь подробности релизов (whats-new)
            RELEASE_DETAILS=$(python3 -c "
          import json
          r = json.load(open('changes_report.json'))
          releases = []
          for a in r.get('new_articles', []) + r.get('updated_articles', []):
              if a.get('is_release') and a.get('summary'):
                  releases.append(a)
          if not releases:
              exit(0)
          lines = []
          lines.append('')
          lines.append('🚀 <b>Новые релизы — подробности:</b>')
          lines.append('')
          esc = lambda s: s.replace('&','&amp;').replace('<','&lt;').replace('>','&gt;')
          for rel in releases[:5]:
              title = rel.get('title', rel['path'])
              summary = rel['summary']
              if len(summary) > 500:
                  summary = summary[:500] + '...'
              lines.append(f'📦 <b>{esc(title)}</b>')
              lines.append(esc(summary))
              lines.append('')
          if len(releases) > 5:
              lines.append(f'...и ещё {len(releases)-5} релизов')
          print(chr(10).join(lines[:60]))
          " 2>/dev/null || echo "")

            if [ -n "$DETAILS" ]; then
              MSG="${MSG}${NL}📋 <b>Что изменилось:</b>${NL}${DETAILS}${NL}"
            fi

            if [ -n "$RELEASE_DETAILS" ]; then
              MSG="${MSG}${RELEASE_DETAILS}${NL}"
            fi
          fi

          MSG="${MSG}${NL}🕐 Синхронизация: ${DATE}${NL}"
          MSG="${MSG}🔗 <a href=\"${REPO_URL}/issues?q=label%3Atranslation+is%3Aopen\">Открыть Issues</a>${NL}"
          MSG="${MSG}🌐 <a href=\"${SITE_URL}\">Сайт</a>"

          # Send via Telegram Bot API
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode="HTML" \
              -d disable_web_page_preview="true" \
              --connect-timeout 10 \
              --max-time 15 \
              || echo "WARNING: Telegram notification failed (non-blocking)"
          else
            echo "WARNING: TG_BOT_TOKEN or TG_CHAT_ID not set, skipping Telegram notification"
          fi

      # ---------- STAGE 7b: Telegram failure notification (only on error) ----------
      - name: Send Telegram notification (failure)
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          DATE=$(date +%Y-%m-%d\ %H:%M)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NL=$'\n'

          # Определяем какой шаг упал
          REASON="неизвестный шаг pipeline"
          if [ "${{ steps.scrape.outcome }}" = "failure" ]; then
            REASON="Scrape — docs.dynatrace.com не ответил / scraper упал / timeout"
          elif [ "${{ steps.verify_corpus.outcome }}" = "failure" ]; then
            REASON="Gate A verify_corpus — в docs/managed попал чужой (не-Managed) source"
          elif [ "${{ steps.detect.outcome }}" = "failure" ]; then
            REASON="Detect changes — сравнение хэшей упало (повреждён registry / нет файлов)"
          elif [ "${{ steps.commit.outcome }}" = "failure" ]; then
            REASON="Git commit/push — конфликт в main / нет прав / rebase не удался"
          elif [ "${{ steps.build.outcome }}" = "failure" ]; then
            REASON="MkDocs build — сломан YAML / битые ссылки / невалидный config"
          elif [ "${{ steps.deploy.outcome }}" = "failure" ]; then
            REASON="Deploy GitHub Pages — peaceiris/actions-gh-pages упал (права / gh-pages branch)"
          fi

          MSG="🚨 <b>Dynatrace Docs — ОШИБКА pipeline</b>${NL}${NL}"
          MSG="${MSG}❌ <b>Упавший шаг:</b> ${REASON}${NL}${NL}"
          MSG="${MSG}📅 ${DATE}${NL}"
          MSG="${MSG}🔗 <a href=\"${RUN_URL}\">Открыть лог запуска</a>"

          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode="HTML" \
              -d disable_web_page_preview="true" \
              --connect-timeout 10 \
              --max-time 15 \
              || echo "WARNING: Failure notification failed to send"
          fi

      # ---------- STAGE 8: Build & Deploy ----------
      - name: Inject AI keys from GitHub Secrets
        if: steps.commit.outputs.committed == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python - <<'PY'
          import json, os
          p = 'docs/assets/ai-config.json'
          c = json.load(open(p, encoding='utf-8'))
          c['gemini_api_key'] = os.environ.get('GEMINI_API_KEY', '')
          c['groq_api_key']   = os.environ.get('GROQ_API_KEY', '')
          json.dump(c, open(p, 'w', encoding='utf-8'), indent=2, ensure_ascii=False)
          print(f"Injected keys → {p} (gemini={bool(c['gemini_api_key'])}, groq={bool(c['groq_api_key'])})")
          PY

      - name: Cache-bust CSS with git SHA
        if: steps.commit.outputs.committed == 'true'
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|\(assets/stylesheets/extra\.v[0-9][0-9]*\.css\)|\1?sha=${SHA}|g" mkdocs.yml
          sed -i "s|\(assets/javascripts/groq-chat\.js\)|\1?sha=${SHA}|g" mkdocs.yml
          echo "Cache-busted CSS+JS with SHA=${SHA}"
          grep -E "extra\.v|groq-chat" mkdocs.yml

      - name: Build MkDocs
        id: build
        if: steps.commit.outputs.committed == 'true'
        run: mkdocs build

      - name: Deploy to GitHub Pages
        id: deploy
        if: steps.commit.outputs.committed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          # Плоская ветка без накопления истории сборок (P1-8, см. deploy.yml).
          force_orphan: true
          user_name: 'Yerkebulan Ardabayev'
          user_email: 'yerkebulan.ardabayev@gmail.com'
          commit_message: 'deploy: sync Managed docs update'

      # ---------- Summary ----------
      - name: Pipeline summary
        if: always()
        run: |
          echo "# Documentation Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| New articles | ${{ steps.detect.outputs.new_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Updated articles | ${{ steps.detect.outputs.updated_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total changes | ${{ steps.detect.outputs.total_changes || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Committed | ${{ steps.commit.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.detect.outputs.total_changes }}" != "0" ]; then
            echo "📝 Очередь на перевод разберёт ночной прогон на Mac (claude -p)." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Нет новых изменений. Все статьи актуальны." >> $GITHUB_STEP_SUMMARY
          fi
