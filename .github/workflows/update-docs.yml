name: Update & Translate Documentation

on:
  schedule:
    # Daily at 02:00 Kazakhstan time (UTC+5) = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      force_retranslate:
        description: 'Force re-translate all pages'
        type: boolean
        default: false
      max_pages:
        description: 'Max pages to scrape'
        type: number
        default: 1000
      skip_scrape:
        description: 'Skip scraping, only translate'
        type: boolean
        default: false

concurrency:
  group: update-docs
  cancel-in-progress: false

jobs:
  # ===== STAGE 1: Scrape =====
  scrape:
    if: ${{ !inputs.skip_scrape }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape documentation
        id: scrape
        run: |
          echo "=== Scraping Dynatrace documentation ==="
          cd scripts
          python scrape_docs.py --max-pages ${{ inputs.max_pages || 1000 }} 2>&1 | tail -20
          echo "scrape_done=true" >> $GITHUB_OUTPUT

      - name: Organize files
        if: steps.scrape.outputs.scrape_done == 'true'
        run: |
          if [ -f scripts/organize_docs.py ]; then
            python scripts/organize_docs.py
          fi

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet docs/en/ 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new content found"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New content detected"
          fi

  # ===== STAGE 2: Translate =====
  translate:
    needs: scrape
    if: always() && (needs.scrape.outputs.has_changes == 'true' || inputs.skip_scrape || inputs.force_retranslate)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Translate to Russian
        id: translate
        run: |
          echo "=== Translating documentation ==="
          python -c "
          import sys
          sys.path.insert(0, 'scripts')
          from pipeline.translator import TranslationPipeline
          from pipeline.config import DOCS_EN, DOCS_RU, CACHE_DIR, TERMINOLOGY_FILE

          pipeline = TranslationPipeline(CACHE_DIR, TERMINOLOGY_FILE)
          if not pipeline.providers:
              print('WARNING: No translation providers. Set API keys.')
              sys.exit(0)

          stats = pipeline.translate_directory(DOCS_EN, DOCS_RU, 'ru')
          print(f'Translated: {stats[\"translated\"]}, Failed: {stats[\"failed\"]}, Skipped: {stats[\"skipped\"]}')
          " 2>&1 || echo "Translation completed with warnings"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        timeout-minutes: 40

      - name: Validate translations
        run: |
          python -c "
          import sys, json
          sys.path.insert(0, 'scripts')
          from pipeline.validator import DocumentValidator
          from pipeline.config import DOCS_DIR

          v = DocumentValidator(DOCS_DIR)
          issues = v.validate_all()
          errors = [i for i in issues if i.severity == 'error']
          print(f'Validation: {len(errors)} errors, {len(issues) - len(errors)} warnings')
          for e in errors[:10]:
              print(f'  {e}')
          "

      - name: Sanitize secrets
        run: |
          if [ -f scripts/sanitize_secrets.py ]; then
            python scripts/sanitize_secrets.py
          fi

      - name: Run documentation tests
        run: python scripts/quality/test_docs.py || true

  # ===== STAGE 3: Commit & Deploy =====
  deploy:
    needs: translate
    if: always() && needs.translate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material>=9.5.0 pymdown-extensions>=10.7

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ scripts/.translation_cache/ mkdocs.yml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update $(date +%Y-%m-%d)"
            git push
          fi

      - name: Build MkDocs
        run: mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: auto-update documentation'

      - name: Summary
        if: always()
        run: |
          echo "# Documentation Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
