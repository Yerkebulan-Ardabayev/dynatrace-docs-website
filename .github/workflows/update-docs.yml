name: Update & Translate Documentation

on:
  schedule:
    # Daily at 02:00 Kazakhstan time (UTC+5) = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      force_retranslate:
        description: 'Force re-translate all pages'
        type: boolean
        default: false
      max_pages:
        description: 'Max pages to scrape'
        type: number
        default: 1000
      skip_scrape:
        description: 'Skip scraping, only translate'
        type: boolean
        default: false

concurrency:
  group: update-docs
  cancel-in-progress: false

jobs:
  # ===== UNIFIED PIPELINE =====
  # All stages run in a single job to share the filesystem.
  # This fixes the critical bug where scraped files were lost
  # between separate jobs (each job = fresh runner).
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ---------- STAGE 1: Scrape ----------
      - name: Scrape documentation
        id: scrape
        if: ${{ !inputs.skip_scrape }}
        run: |
          echo "=== Stage 1: Scraping Dynatrace documentation ==="
          cd scripts
          python scrape_docs.py --max-pages ${{ inputs.max_pages || 1000 }} 2>&1 | tail -30
          echo "scrape_done=true" >> $GITHUB_OUTPUT

      - name: Organize files
        if: steps.scrape.outputs.scrape_done == 'true'
        run: |
          if [ -f scripts/organize_docs.py ]; then
            python scripts/organize_docs.py
          fi

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet docs/en/ 2>/dev/null && [ "${{ inputs.force_retranslate }}" != "true" ] && [ "${{ inputs.skip_scrape }}" != "true" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new content found"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            CHANGED=$(git diff --name-only docs/en/ 2>/dev/null | wc -l)
            echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT
            echo "New/changed content detected: $CHANGED files"
          fi

      # ---------- STAGE 2: Translate ----------
      - name: Translate to Russian
        id: translate
        if: steps.check.outputs.has_changes == 'true' || inputs.force_retranslate
        run: |
          echo "=== Stage 2: Translating documentation ==="
          # Pipeline exits 0 even on quota exhaustion — translates what it can,
          # remaining files will be picked up on the next run.
          python scripts/pipeline/run_pipeline.py translate --target-lang ru || true
          echo "translate_done=true" >> $GITHUB_OUTPUT
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        timeout-minutes: 40

      # ---------- STAGE 3: Nav Update ----------
      - name: Update navigation (en -> ru)
        if: steps.check.outputs.has_changes == 'true' || inputs.force_retranslate
        run: |
          echo "=== Stage 3: Updating navigation ==="
          python scripts/pipeline/run_pipeline.py nav-upgrade --apply

      # ---------- STAGE 4: Validate ----------
      - name: Validate translations
        if: steps.check.outputs.has_changes == 'true' || inputs.force_retranslate
        run: |
          echo "=== Stage 4: Validation ==="
          python scripts/pipeline/run_pipeline.py validate

      - name: Sanitize secrets
        run: |
          if [ -f scripts/sanitize_secrets.py ]; then
            python scripts/sanitize_secrets.py
          fi

      - name: Clean expired cache
        run: python scripts/pipeline/run_pipeline.py cache-clean

      # ---------- STAGE 5: Commit & Deploy ----------
      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ scripts/.translation_cache/ mkdocs.yml
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            CHANGED=$(git diff --staged --stat | tail -1)
            git commit -m "docs: auto-update $(date +%Y-%m-%d)

          $CHANGED"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build MkDocs
        if: steps.commit.outputs.committed == 'true'
        run: mkdocs build

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.committed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: auto-update documentation'

      # ---------- Summary ----------
      - name: Pipeline summary
        if: always()
        run: |
          echo "# Documentation Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scrape | ${{ steps.scrape.outcome || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes detected | ${{ steps.check.outputs.has_changes }} (${{ steps.check.outputs.changed_files || 0 }} files) |" >> $GITHUB_STEP_SUMMARY
          echo "| Translate | ${{ steps.translate.outcome || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Committed | ${{ steps.commit.outputs.committed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
