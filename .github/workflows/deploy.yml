name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material>=9.5.0 pymdown-extensions>=10.7 pyyaml>=6.0

      - name: Run documentation tests
        run: python scripts/quality/test_docs.py

      - name: Run pipeline validation
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'scripts')
          from pipeline.validator import DocumentValidator, NavValidator
          from pipeline.config import DOCS_DIR, MKDOCS_CONFIG

          dv = DocumentValidator(DOCS_DIR)
          issues = dv.validate_all()
          nv = NavValidator(MKDOCS_CONFIG, DOCS_DIR)
          nav_issues = nv.validate()

          errors = [i for i in issues + nav_issues if i.severity == 'error']
          warnings = [i for i in issues + nav_issues if i.severity == 'warning']
          print(f'Validation: {len(errors)} errors, {len(warnings)} warnings')

          for e in errors[:20]:
              print(f'  ERROR: {e}')

          if errors:
              print(f'FAILED: {len(errors)} validation errors found. Deployment blocked.')
              sys.exit(1)
          else:
              print('Validation passed.')
          "

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material>=9.5.0 pymdown-extensions>=10.7

      - name: Build site
        run: mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: update documentation'

      - name: Create summary
        if: always()
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Site deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://$(echo ${{ github.repository }} | cut -d'/' -f1).github.io/$(echo ${{ github.repository }} | cut -d'/' -f2)/" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
