name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material>=9.5.0 pymdown-extensions>=10.7 pyyaml>=6.0

      - name: Validate mkdocs config
        run: mkdocs build --strict 2>&1 | tail -5 || true

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material>=9.5.0 pymdown-extensions>=10.7

      - name: Inject AI keys from GitHub Secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python - <<'PY'
          import json, os
          p = 'docs/assets/ai-config.json'
          c = json.load(open(p, encoding='utf-8'))
          c['gemini_api_key'] = os.environ.get('GEMINI_API_KEY', '')
          c['groq_api_key']   = os.environ.get('GROQ_API_KEY', '')
          json.dump(c, open(p, 'w', encoding='utf-8'), indent=2, ensure_ascii=False)
          print(f"Injected keys → {p} (gemini={bool(c['gemini_api_key'])}, groq={bool(c['groq_api_key'])})")
          PY

      - name: Cache-bust CSS with git SHA
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|\(assets/stylesheets/extra\.v[0-9][0-9]*\.css\)|\1?sha=${SHA}|g" mkdocs.yml
          echo "CSS cache-busted with SHA=${SHA}"
          grep "extra\.v" mkdocs.yml

      - name: Build site
        run: mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: 'Yerkebulan Ardabayev'
          user_email: 'yerkebulan.ardabayev@gmail.com'
          commit_message: 'deploy: update documentation'

      - name: Create summary
        if: always()
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Site deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://$(echo ${{ github.repository }} | cut -d'/' -f1).github.io/$(echo ${{ github.repository }} | cut -d'/' -f2)/" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
